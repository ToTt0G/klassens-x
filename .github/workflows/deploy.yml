name: Deploy Production
on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tott0g/klassens-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          target: runner

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}

      - name: Trigger Dokploy webhook
        run: curl -sf "${{ secrets.DOKPLOY_WEBHOOK_URL }}" || true
